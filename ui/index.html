<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body { background: transparent !important; overflow: hidden; margin: 0; font-family: 'Segoe UI', sans-serif; }
        #chat { position: absolute; top: 15px; left: 15px; width: 400px; z-index: 9999; }
        #messages { height: 250px; overflow: hidden; display: flex; flex-direction: column; justify-content: flex-end; transition: opacity 0.3s; opacity: 0; }
        .msg { background: rgba(0, 0, 0, 0.4); color: white; padding: 6px 12px; margin-top: 3px; border-radius: 5px; font-size: 14px; width: fit-content; text-shadow: 1px 1px 1px #000; }
        
        #suggestions { background: rgba(0, 0, 0, 0.85); border-radius: 6px; margin-bottom: 5px; max-height: 150px; overflow-y: auto; display: none; border-left: 4px solid #3498db; }
        .suggestion { padding: 8px 12px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .s-name { font-weight: bold; color: #3498db; font-size: 13px; }
        .s-help { color: #ccc; font-size: 11px; display: block; }

        #input-area { background: rgba(0, 0, 0, 0.65); padding: 12px; margin-top: 8px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); display: none; }
        input { width: 100%; background: transparent; border: none; color: white; outline: none; font-size: 15px; }
    </style>
</head>
<body>
    <div id="chat">
        <div id="messages"></div>
        <div id="suggestions"></div>
        <div id="input-area">
            <input type="text" id="chat-input" spellcheck="false" autocomplete="off">
        </div>
    </div>

    <script>
        // Sayfa tamamen yüklenmeden kodu çalıştırma (Hataları önleyen ana kısım)
        document.addEventListener('DOMContentLoaded', function() {
            const chatInput = document.getElementById('chat-input');
            const inputArea = document.getElementById('input-area');
            const messagesContainer = document.getElementById('messages');
            const suggestions = document.getElementById('suggestions');
            
            let messageHistory = [];
            let allCommands = [];
            let historyIndex = -1;
            let hideTimeout = null;

            function setCursorToEnd(el) {
                setTimeout(() => {
                    el.focus();
                    el.setSelectionRange(el.value.length, el.value.length);
                }, 1);
            }

            window.addEventListener('message', (e) => {
                const d = e.data;
                if (d.type === 'ON_OPEN') {
                    inputArea.style.display = 'block';
                    messagesContainer.style.opacity = "1";
                    chatInput.focus();
                    historyIndex = -1;
                    clearTimeout(hideTimeout);
                } else if (d.type === 'ON_CLOSE') {
                    inputArea.style.display = 'none';
                    suggestions.style.display = 'none';
                    chatInput.value = '';
                    hideTimeout = setTimeout(() => { messagesContainer.style.opacity = "0"; }, 7000);
                } else if (d.type === 'ON_MESSAGE') {
                    const div = document.createElement('div');
                    div.className = 'msg';
                    if (d.message.args) div.innerHTML = `<b>${d.message.args[0]}:</b> ${d.message.args[1]}`;
                    messagesContainer.appendChild(div);
                    messagesContainer.style.opacity = "1";
                    clearTimeout(hideTimeout);
                    hideTimeout = setTimeout(() => { if (inputArea.style.display === 'none') messagesContainer.style.opacity = "0"; }, 10000);
                } else if (d.type === 'UPDATE_SUGGESTIONS') {
                    allCommands = d.suggestions || [];
                }
            });

            chatInput.oninput = function() {
                const val = chatInput.value;
                if (val.startsWith('/')) {
                    const query = val.substring(1).toLowerCase();
                    const filtered = allCommands.filter(c => c.name.toLowerCase().includes(query)).slice(0, 5);
                    if (filtered.length > 0) {
                        suggestions.style.display = 'block';
                        suggestions.innerHTML = filtered.map(c => `<div class="suggestion"><span class="s-name">/${c.name}</span><span class="s-help">${c.help}</span></div>`).join('');
                    } else { suggestions.style.display = 'none'; }
                } else { suggestions.style.display = 'none'; }
            };

            document.onkeydown = function(e) {
                if (e.key === 'Enter') {
                    let val = chatInput.value.trim();
                    if (val !== "") {
                        messageHistory.unshift(val);
                        fetch(`https://${window.GetParentResourceName()}/chatResult`, { method: 'POST', body: JSON.stringify({ message: val }) });
                    } else { fetch(`https://${window.GetParentResourceName()}/close`, { method: 'POST' }); }
                } else if (e.key === 'Escape') {
                    fetch(`https://${window.GetParentResourceName()}/close`, { method: 'POST' });
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    if (historyIndex < messageHistory.length - 1) {
                        historyIndex++;
                        chatInput.value = messageHistory[historyIndex];
                        setCursorToEnd(chatInput);
                    }
                } else if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    if (historyIndex > 0) {
                        historyIndex--;
                        chatInput.value = messageHistory[historyIndex];
                        setCursorToEnd(chatInput);
                    } else {
                        historyIndex = -1;
                        chatInput.value = "";
                    }
                }
            };
        });
    </script>
</body>
</html>
